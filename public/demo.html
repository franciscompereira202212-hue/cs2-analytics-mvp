<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Demo Analysis</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0a0f1c;
      color: white;
      padding: 30px;
    }

    .card {
      background: #111827;
      padding: 20px;
      border-radius: 10px;
      max-width: 600px;
    }

    .stat {
      display: flex;
      justify-content: space-between;
      margin: 8px 0;
    }

    ul {
      margin-top: 10px;
    }

    a {
      color: #60a5fa;
    }
  </style>
</head>

<body>

<a href="/">← Back</a>

<h2>Demo Analysis</h2>

<div class="card" id="content">Loading...</div>

<script>

const params = new URLSearchParams(window.location.search);
const file = params.get("file");

async function load() {
  const res = await fetch(`/demo/${encodeURIComponent(file)}`);
  const data = await res.json();

  document.getElementById("content").innerHTML = `
    <div class="stat"><span>File</span><b>${data.file}</b></div>
    <div class="stat"><span>Rounds</span><b>${data.rounds}</b></div>
    <div class="stat"><span>Kills</span><b>${data.kills}</b></div>
    <div class="stat"><span>Deaths</span><b>${data.deaths}</b></div>

    <h3>Mistakes</h3>
    <ul>
      ${data.mistakes.map(m => `<li>${m}</li>`).join("")}
    </ul>
  `;
}

load();

</script>

</body>
</html>
