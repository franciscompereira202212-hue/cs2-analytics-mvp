<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Coach Analysis</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0a0f1c;
      color: white;
      padding: 30px;
    }

    .card {
      background: #111827;
      padding: 20px;
      border-radius: 10px;
      max-width: 800px;
    }

    .verdict {
      font-size: 18px;
      margin-bottom: 15px;
      color: #60a5fa;
    }

    .round {
      background: #1f2937;
      margin: 10px 0;
      padding: 10px;
      border-radius: 8px;
    }

    .bad {
      border-left: 4px solid red;
    }

    .good {
      border-left: 4px solid green;
    }

    .ok {
      border-left: 4px solid orange;
    }
  </style>
</head>

<body>

<a href="/">← Back</a>

<h2>👨‍🏫 Coach Analysis</h2>

<div class="card" id="content">Loading...</div>

<script>

const params = new URLSearchParams(window.location.search);
const file = params.get("file");

async function load() {
  const res = await fetch(`/demo/${encodeURIComponent(file)}`);
  const data = await res.json();

  let html = `
    <div class="verdict">Verdict: ${data.coachVerdict}</div>
  `;

  data.rounds.forEach(r => {
    let cls = "ok";
    if (r.rating === "BAD") cls = "bad";
    if (r.rating === "GOOD") cls = "good";

    html += `
      <div class="round ${cls}">
        <b>Round ${r.round}</b> - ${r.rating}
        <ul>
          ${r.mistakes.map(m => `<li>${m}</li>`).join("")}
        </ul>
      </div>
    `;
  });

  document.getElementById("content").innerHTML = html;
}

load();

</script>

</body>
</html>
