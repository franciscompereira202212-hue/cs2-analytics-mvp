<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Coach Analysis</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0a0f1c;
  color: white;
  padding: 20px;
}

.card {
  background: #111827;
  padding: 15px;
  border-radius: 10px;
}

.bad { border-left: 4px solid red; padding: 10px; }
.ok { border-left: 4px solid orange; padding: 10px; }
.good { border-left: 4px solid green; padding: 10px; }
</style>
</head>

<body>

<a href="/">← Back</a>

<h2>Coach Report</h2>

<div id="content" class="card">Loading...</div>

<script>
const file = new URLSearchParams(window.location.search).get("file");

async function load() {
  const res = await fetch("/demo/" + file);
  const data = await res.json();

  let html = `<h3>${data.verdict}</h3>`;

  data.rounds.forEach(r => {
    let cls = r.rating === "BAD" ? "bad" : r.rating === "GOOD" ? "good" : "ok";

    html += `
      <div class="${cls}">
        <b>Round ${r.id}</b> - ${r.rating}
        <ul>
          ${(r.issues || []).map(i => `<li>${i}</li>`).join("")}
        </ul>
      </div>
    `;
  });

  document.getElementById("content").innerHTML = html;
}

load();
</script>

</body>
</html>
