<!DOCTYPE html>
<html>
<head>
    <title>Visualizador Nexus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #map-bg { 
            width: 700px; height: 700px; 
            background-size: contain; background-repeat: no-repeat;
            position: relative; border: 2px solid #22d3ee; border-radius: 15px;
        }
        .dot { position: absolute; width: 10px; height: 10px; border-radius: 50%; transform: translate(-50%, -50%); border: 1px solid white; }
        .ct { background: #3b82f6; }
        .t { background: #ef4444; }
    </style>
</head>
<body class="bg-[#05070a] text-white p-10 flex gap-10">
    <div>
        <div id="map-bg"></div>
        <div class="mt-4 flex gap-4" id="round-nav"></div>
    </div>
    <div class="flex-1">
        <h2 id="title" class="text-2xl font-bold text-cyan-400 mb-4 font-mono">MAPA: ---</h2>
        <div class="bg-gray-900 p-6 rounded-2xl border border-white/5">
            <h3 class="text-sm text-gray-500 uppercase mb-2">Verdict do Ghost Coach</h3>
            <p id="verdict" class="text-lg italic">A processar dados...</p>
            <div id="tips" class="mt-4 space-y-2"></div>
        </div>
    </div>

    <script>
        const file = new URLSearchParams(window.location.search).get('file');
        
        async function start() {
            const res = await fetch(`/demo/${file}`);
            const data = await res.json();
            
            document.getElementById('title').innerText = `MAPA: ${data.map.toUpperCase()}`;
            
            // Tenta carregar o radar automaticamente (URL externa de exemplo)
            document.getElementById('map-bg').style.backgroundImage = `url('https://raw.githubusercontent.com/p_p_p/cs-maps/master/${data.map}.png')`;

            const round = data.rounds[0]; // Mostra o primeiro round
            document.getElementById('verdict').innerText = round.rating === "GOOD" ? "✅ Bom Posicionamento" : "⚠️ Erros Detetados";
            document.getElementById('tips').innerHTML = round.suggestions.map(s => `<p class="text-sm opacity-80">• ${s}</p>`).join('');

            // Desenha os bonecos (ajuste de escala simples)
            const map = document.getElementById('map-bg');
            round.mapData.forEach(p => {
                const dot = document.createElement('div');
                dot.className = `dot ${p.side === 3 ? 'ct' : 't'}`;
                // Fórmula de conversão simplificada
                dot.style.left = `${((p.x + 3000) / 6000) * 100}%`;
                dot.style.top = `${((3000 - p.y) / 6000) * 100}%`;
                map.appendChild(dot);
            });
        }
        start();
    </script>
</body>
</html>
