<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Nexus.gg | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #05070a; color: white; font-family: sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body class="p-10">
    <div class="max-w-5xl mx-auto">
        <h1 class="text-4xl font-black text-cyan-500 mb-10 italic">NEXUS.GG</h1>
        
        <div class="glass p-10 rounded-3xl text-center border-2 border-dashed border-cyan-500/30">
            <h2 class="text-xl font-bold mb-4">Upload de Nova Demo</h2>
            <input type="file" id="demoFile" class="hidden" accept=".dem" onchange="upload()">
            <label for="demoFile" id="uploadBtn" class="bg-cyan-500 text-black px-8 py-3 rounded-full font-bold cursor-pointer hover:bg-cyan-400 transition">
                Selecionar Ficheiro .dem
            </label>
            <p id="status" class="mt-4 text-sm text-gray-400"></p>
        </div>

        <div class="mt-12">
            <h3 class="text-xl font-bold mb-6">Suas Análises</h3>
            <div id="demoList" class="grid gap-4"></div>
        </div>
    </div>

    <script>
        async function upload() {
            const file = document.getElementById('demoFile').files[0];
            const status = document.getElementById('status');
            const btn = document.getElementById('uploadBtn');

            const formData = new FormData();
            formData.append('demo', file);

            status.innerText = "A carregar... (Demos grandes podem demorar)";
            btn.style.opacity = "0.5";

            const res = await fetch('/upload', { method: 'POST', body: formData });
            if(res.ok) {
                status.innerText = "✅ Sucesso!";
                loadDemos();
            } else {
                status.innerText = "❌ Erro no upload.";
            }
            btn.style.opacity = "1";
        }

        async function loadDemos() {
            const res = await fetch('/demos');
            const demos = await res.json();
            const list = document.getElementById('demoList');
            list.innerHTML = demos.map(d => `
                <div class="glass p-5 rounded-2xl flex justify-between items-center">
                    <span>${d}</span>
                    <a href="demo.html?file=${d}" class="bg-white/10 px-4 py-2 rounded-lg text-xs font-bold hover:bg-cyan-500 hover:text-black transition">ANALISAR</a>
                </div>
            `).join('');
        }
        loadDemos();
    </script>
</body>
</html>
