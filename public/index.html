<!DOCTYPE html>
<html>
<body>

<h2>Upload Demo</h2>

<input type="file" id="file">
<button onclick="upload()">Upload</button>

<script>
async function upload() {
  const file = document.getElementById("file").files[0];

  const data = new FormData();
  data.append("demo", file);

  await fetch("/upload", {
    method: "POST",
    body: data
  });

  alert("Upload feito!");
}
</script>

</body>
</html>
