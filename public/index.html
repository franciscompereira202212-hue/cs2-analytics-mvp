<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>CS2 Analytics</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0a0f1c;
      color: white;
      display: flex;
    }

    /* SIDEBAR */
    .sidebar {
      width: 220px;
      background: #0f172a;
      height: 100vh;
      padding: 20px;
      box-sizing: border-box;
    }

    .logo {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 30px;
    }

    .nav {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .nav a {
      color: #cbd5e1;
      text-decoration: none;
      padding: 8px;
      border-radius: 6px;
    }

    .nav a:hover {
      background: #1e293b;
    }

    /* MAIN */
    .main {
      flex: 1;
      padding: 25px;
    }

    .title {
      font-size: 26px;
      font-weight: bold;
      margin-bottom: 20px;
    }

    .card {
      background: #111827;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 20px;
    }

    input {
      padding: 10px;
      width: 60%;
    }

    button {
      padding: 10px 15px;
      background: #3b82f6;
      border: none;
      color: white;
      border-radius: 8px;
      cursor: pointer;
      margin-left: 10px;
    }

    button:hover {
      background: #2563eb;
    }

    ul {
      padding-left: 18px;
    }

    a {
      color: #60a5fa;
      text-decoration: none;
    }
  </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="logo">🎯 CS2 ANALYTICS</div>

  <div class="nav">
    <a href="#">Dashboard</a>
    <a href="#">Demos</a>
    <a href="#">Ghost (soon)</a>
    <a href="#">Voice (soon)</a>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <div class="title">Dashboard</div>

  <!-- UPLOAD -->
  <div class="card">
    <h3>Upload Demo</h3>

    <input type="file" id="file">
    <button onclick="upload()">Upload</button>
  </div>

  <!-- STATS -->
  <div class="card">
    <h3>Overview</h3>
    <p>Demos uploaded: <b id="count">0</b></p>
  </div>

  <!-- LIST -->
  <div class="card">
    <h3>Demos</h3>
    <ul id="list"></ul>
  </div>

</div>

<script>

async function upload() {
  const file = document.getElementById("file").files[0];
  if (!file) return alert("Escolhe um ficheiro");

  const data = new FormData();
  data.append("demo", file);

  await fetch("/upload", {
    method: "POST",
    body: data
  });

  loadDemos();
}

async function loadDemos() {
  const res = await fetch("/demos");
  const files = await res.json();

  document.getElementById("count").innerText = files.length;

  const list = document.getElementById("list");
  list.innerHTML = "";

  files.forEach(f => {
    const li = document.createElement("li");

    const link = document.createElement("a");
    link.href = `/demo.html?file=${encodeURIComponent(f)}`;
    link.textContent = "▶ " + f;

    li.appendChild(link);
    list.appendChild(li);
  });
}

loadDemos();

</script>

</body>
</html>
