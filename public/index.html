<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexus.gg | AI Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lucide-static@0.321.0/font/lucide.min.css">
  <style>
    body { background: #05070a; color: white; font-family: 'Inter', sans-serif; }
    .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
  </style>
</head>
<body class="flex min-h-screen">

<div class="w-64 glass border-r border-white/5 p-6 hidden md:block">
  <h2 class="text-xl font-black italic tracking-tighter text-cyan-500 mb-10">NEXUS.GG</h2>
  <nav class="space-y-4 text-gray-400">
    <div class="text-cyan-400 font-bold flex items-center gap-2"><i class="lucide-home"></i> Dashboard</div>
    <div class="flex items-center gap-2 hover:text-white cursor-pointer"><i class="lucide-ghost"></i> Ghost Coach</div>
  </nav>
</div>

<div class="flex-1 p-8">
  <header class="flex justify-between items-center mb-10">
    <h1 class="text-3xl font-bold">Análise de Performance</h1>
  </header>

  <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
    <div class="lg:col-span-2">
      <div class="glass p-10 rounded-3xl border-2 border-dashed border-white/10 text-center relative">
        <i class="lucide-upload-cloud text-cyan-400 text-5xl mb-4 mx-auto"></i>
        <h3 class="text-xl font-bold mb-2">Upload de Demo (.dem)</h3>
        <p class="text-gray-400 text-sm mb-6">Máximo 200MB para análise profunda</p>
        
        <input type="file" id="fileInput" class="absolute inset-0 opacity-0 cursor-pointer" accept=".dem">
        <button id="uploadBtn" onclick="upload()" class="bg-cyan-500 text-black font-bold px-10 py-3 rounded-xl hover:bg-cyan-400 transition shadow-lg">
          Analisar Agora
        </button>
        <div id="statusMsg" class="mt-4 text-sm font-medium"></div>
      </div>

      <div class="mt-10">
        <h3 class="text-lg font-bold mb-4">Demos Recentes</h3>
        <div id="list" class="space-y-3">
          <p class="text-gray-500 italic text-sm">A carregar histórico...</p>
        </div>
      </div>
    </div>

    <div class="glass p-6 rounded-3xl h-fit">
      <h4 class="text-xs font-bold text-gray-500 uppercase tracking-widest mb-4">Status da IA</h4>
      <div class="flex items-center gap-2 text-green-400 text-sm mb-2">
        <div class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></div> Engine Online
      </div>
      <p class="text-xs text-gray-400 leading-relaxed">Pronto para comparar o teu posicionamento com jogadores de nível Major.</p>
    </div>
  </div>
</div>

<script>
async function upload() {
  const fileInput = document.getElementById("fileInput");
  const file = fileInput.files[0];
  const btn = document.getElementById("uploadBtn");
  const status = document.getElementById("statusMsg");

  if(!file) return alert("Seleciona um ficheiro primeiro!");

  const data = new FormData();
  data.append("demo", file);

  btn.disabled = true;
  btn.textContent = "A carregar...";
  status.textContent = "Enviando ficheiro para o servidor... (Pode demorar)";
  status.className = "mt-4 text-cyan-400 animate-pulse";

  try {
    const res = await fetch("/upload", { 
      method: "POST", 
      body: data 
    });

    if (res.ok) {
      status.textContent = "✅ Upload concluído! A processar...";
      status.className = "mt-4 text-green-400";
      setTimeout(load, 1000);
    } else {
      throw new Error("Erro no servidor");
    }
  } catch (err) {
    status.textContent = "❌ Erro no upload. Verifica o console.";
    status.className = "mt-4 text-red-500";
    console.error(err);
  } finally {
    btn.disabled = false;
    btn.textContent = "Analisar Agora";
  }
}

async function load() {
  const res = await fetch("/demos");
  const files = await res.json();
  const list = document.getElementById("list");
  list.innerHTML = "";

  if(files.length === 0) {
    list.innerHTML = "<p class='text-gray-600 text-sm italic'>Nenhuma demo encontrada.</p>";
    return;
  }

  files.forEach(f => {
    const div = document.createElement("div");
    div.className = "glass p-4 rounded-2xl flex justify-between items-center group hover:border-cyan-500/50 transition";
    div.innerHTML = `
      <div class="flex items-center gap-3">
        <i class="lucide-file-text text-gray-500 group-hover:text-cyan-400"></i>
        <span class="text-sm font-medium truncate w-48">${f}</span>
      </div>
      <a href="/demo.html?file=${f}" class="text-xs bg-white/5 hover:bg-cyan-500 hover:text-black px-4 py-2 rounded-lg font-bold transition">VER ANALISE</a>
    `;
    list.appendChild(div);
  });
}

load();
</script>

</body>
</html>
