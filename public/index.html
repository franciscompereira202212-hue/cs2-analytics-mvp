<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>CS2 Coach Dashboard</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0a0f1c;
      color: white;
      display: flex;
    }

    .sidebar {
      width: 220px;
      background: #0f172a;
      height: 100vh;
      padding: 20px;
    }

    .main {
      flex: 1;
      padding: 25px;
    }

    .card {
      background: #111827;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 15px;
    }

    a {
      color: #60a5fa;
    }
  </style>
</head>

<body>

<div class="sidebar">
  <h3>CS2 Coach</h3>
  <p><a href="#">Dashboard</a></p>
</div>

<div class="main">

  <div class="card">
    <h3>Upload Demo</h3>
    <input type="file" id="file">
    <button onclick="upload()">Upload</button>
  </div>

  <div class="card">
    <h3>Demos</h3>
    <ul id="list"></ul>
  </div>

</div>

<script>
async function upload() {
  const file = document.getElementById("file").files[0];

  const data = new FormData();
  data.append("demo", file);

  await fetch("/upload", {
    method: "POST",
    body: data
  });

  load();
}

async function load() {
  const res = await fetch("/demos");
  const files = await res.json();

  const list = document.getElementById("list");
  list.innerHTML = "";

  files.forEach(f => {
    const li = document.createElement("li");

    const a = document.createElement("a");
    a.href = `/demo.html?file=${f}`;
    a.textContent = f;

    li.appendChild(a);
    list.appendChild(li);
  });
}

load();
</script>

</body>
</html>
